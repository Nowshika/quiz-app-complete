<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizIQ — SDG 4</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div id="landing-screen" class="screen active">
    <div class="card">
      <div class="sdg-badge"><span class="badge-dot"></span>SDG 4 — Quality Education</div>
      <h1>QuizIQ</h1>
      <p class="subtitle">Test your knowledge on global education goals and track your progress in real-time.</p>
      
      <label>YOUR NAME</label>
      <input type="text" id="student-name" placeholder="e.g. Alex Smith"/>
      
      <button class="btn-primary" onclick="startQuiz()">Start Quiz</button>
      <button class="btn-ghost" onclick="viewLeaderboard()">View Leaderboard</button>
    </div>
  </div>

  <div id="quiz-screen" class="screen">
    <div class="card">
      <div class="quiz-topbar">
        <span id="question-counter" class="q-count">Question 1 of 10</span>
        <span id="quiz-category" class="q-cat">General</span>
      </div>
      
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
      </div>

      <div id="question-text" class="question-text">Loading question...</div>
      
      <div id="options-container" class="options">
        </div>

      <div class="nav-row">
        <button class="btn-ghost" onclick="prevQuestion()">Back</button>
        <button class="btn-primary" id="next-btn" onclick="nextQuestion()">Next</button>
      </div>
    </div>
  </div>

  <div id="result-screen" class="screen">
    <div class="card">
      <div class="score-ring" id="score-circle">0%</div>
      <h2 id="result-name" class="result-name"></h2>
      <p id="result-message" class="result-msg"></p>
      
      <div class="stats-row">
        <div class="stat-box">
          <span id="stat-correct" class="stat-val green">0</span>
          <span class="stat-lbl">Correct</span>
        </div>
        <div class="stat-box">
          <span id="stat-wrong" class="stat-val red">0</span>
          <span class="stat-lbl">Wrong</span>
        </div>
        <div class="stat-box">
          <span id="stat-total" class="stat-val">0</span>
          <span class="stat-lbl">Total</span>
        </div>
      </div>

      <button class="btn-primary" onclick="restartQuiz()">Try Again</button>
      <button class="btn-ghost" onclick="viewLeaderboard()">Leaderboard</button>
    </div>
  </div>

  <div id="leaderboard-screen" class="screen">
    <div class="card">
      <h2 class="lb-title">Global Leaderboard</h2>
      <div id="leaderboard-list" class="lb-container">
        </div>
      <button class="btn-ghost" style="margin-top: 1.5rem;" onclick="restartQuiz()">Back to Home</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
